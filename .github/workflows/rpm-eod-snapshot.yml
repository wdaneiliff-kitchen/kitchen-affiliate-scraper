name: RPM end-of-day snapshot

# Fires at 11:59 PM Central — both crons handle DST (CDT=UTC-5, CST=UTC-6).
# Calculates the full day's RPM commission, fills any gap not yet written
# intraday, and writes the day's closing total to RPM Daily Snapshots.
on:
  schedule:
    - cron: '59 4 * * *'  # 11:59 PM CDT (Apr–Oct)
    - cron: '59 5 * * *'  # 11:59 PM CST (Nov–Mar)
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @kitchen/shared

      - name: Write Google credentials
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: node -e "require('fs').writeFileSync('credentials.json', process.env.GOOGLE_CREDENTIALS_JSON || '')"

      - name: Reconcile and snapshot RPM
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_PATH: ${{ github.workspace }}/credentials.json
        run: |
          cd packages/shared
          node --input-type=module <<'EOF'
          import { google } from 'googleapis';
          import { readFile } from 'fs/promises';
          import { createHash } from 'crypto';

          const spreadsheetId = process.env.GOOGLE_SHEET_ID;
          const credentials = JSON.parse(await readFile(process.env.GOOGLE_CREDENTIALS_PATH, 'utf-8'));
          const auth = new google.auth.GoogleAuth({ credentials, scopes: ['https://www.googleapis.com/auth/spreadsheets'] });
          const sheets = google.sheets({ version: 'v4', auth: await auth.getClient() });

          const SNAPSHOT_TAB  = 'RPM Daily Snapshots';
          const TRACKING_TAB  = 'RPM Commissions';
          const MAIN_TAB      = 'Comissions';
          const ADVERTISER_ID = 'rpm-pickleball';
          const COMMISSION_RATE = 0.40;

          // Current Central date/time
          const centralParts = new Intl.DateTimeFormat('en-US', {
            timeZone: 'America/Chicago',
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false,
          }).formatToParts(new Date()).reduce((acc, p) => ({ ...acc, [p.type]: p.value }), {});
          const centralDate = `${centralParts.year}-${centralParts.month}-${centralParts.day}`;
          const nowCentral  = `${centralDate} ${centralParts.hour}:${centralParts.minute}:${centralParts.second}`;

          // If we're firing in the small hours (GH Actions schedule delay, or the
          // CST cron firing during CDT), reconcile YESTERDAY instead — the job is
          // intended for 11:59pm Central, so a post-midnight clock means the day
          // we actually mean to close out is the previous one. Without this, the
          // script would attribute yesterday's totals to today.
          const hour = parseInt(centralParts.hour, 10);
          let reconcileDate = centralDate;
          let reconcileTimestamp = nowCentral;
          if (hour < 6) {
            const [yy, mm, dd] = centralDate.split('-').map(Number);
            const prev = new Date(Date.UTC(yy, mm - 1, dd));
            prev.setUTCDate(prev.getUTCDate() - 1);
            reconcileDate = prev.toISOString().slice(0, 10);
            reconcileTimestamp = `${reconcileDate} 23:59:${centralParts.second}`;
            console.log(`Late run detected (hour ${hour} Central) — reconciling ${reconcileDate} instead of ${centralDate}`);
          }

          // 1. Ensure snapshot tab exists before any reads
          const meta = await sheets.spreadsheets.get({ spreadsheetId });
          const tabExists = meta.data.sheets.some(s => s.properties.title === SNAPSHOT_TAB);
          if (!tabExists) {
            await sheets.spreadsheets.batchUpdate({
              spreadsheetId,
              requestBody: { requests: [{ addSheet: { properties: { title: SNAPSHOT_TAB } } }] },
            });
            await sheets.spreadsheets.values.update({
              spreadsheetId, range: `${SNAPSHOT_TAB}!A1`, valueInputOption: 'RAW',
              requestBody: { values: [['date', 'total_sales', 'total_earned_usd', 'recorded_at']] },
            });
            console.log(`Created tab: ${SNAPSHOT_TAB}`);
          }

          // 2. Get today's cumulative total from RPM Commissions tracking tab
          const tracking = await sheets.spreadsheets.values.get({ spreadsheetId, range: `${TRACKING_TAB}!A:E` });
          const trackRows = tracking.data.values || [];
          if (trackRows.length < 2) { console.error('No RPM tracking data'); process.exit(1); }
          const lastTrack = trackRows[trackRows.length - 1];
          const todayCumulative = parseFloat(lastTrack[2]);
          const todayCumulativeSales = parseInt(lastTrack[1]);

          // 3. Get yesterday's snapshot to compute today's full day total
          const snapRes = await sheets.spreadsheets.values.get({ spreadsheetId, range: `${SNAPSHOT_TAB}!A:D` });
          const snapRows = (snapRes.data.values || []).slice(1);
          const yesterdayRow = snapRows.filter(r => r[0] < reconcileDate).slice(-1)[0];
          if (!yesterdayRow) {
            console.log('No prior snapshot found — skipping gap calculation to avoid writing bad data.');
            console.log('Write a baseline snapshot manually, then this job will work correctly going forward.');
            process.exit(0);
          }
          const yesterdayCumulative = parseFloat(yesterdayRow[2]);
          const yesterdaySales = parseInt(yesterdayRow[1]);

          const todayTotalEarned = Math.round((todayCumulative - yesterdayCumulative) * 100); // cents
          const todayTotalSales  = todayCumulativeSales - yesterdaySales;
          console.log(`Today's full day commission: $${(todayTotalEarned / 100).toFixed(2)} across ${todayTotalSales} sales`);

          // 4. Sum what's already been written to the main sheet for today from RPM
          const mainRes = await sheets.spreadsheets.values.get({ spreadsheetId, range: `${MAIN_TAB}!A:H` });
          const mainRows = (mainRes.data.values || []).slice(1);
          const todayRpmRows = mainRows.filter(r => r[1] === ADVERTISER_ID && (r[3] || '').startsWith(reconcileDate));
          const alreadyWrittenCents = todayRpmRows.reduce((sum, r) => sum + parseInt(r[6] || '0', 10), 0);
          console.log(`Already written today: $${(alreadyWrittenCents / 100).toFixed(2)}`);

          // 5. Write the gap if there's anything missing
          const gapCents = todayTotalEarned - alreadyWrittenCents;
          if (gapCents > 0) {
            const saleCents = Math.round(gapCents / COMMISSION_RATE);
            const txId = 'gen_' + createHash('sha256')
              .update(`${ADVERTISER_ID}|${nowCentral}|eod|${gapCents}`)
              .digest('base64url').slice(0, 16);

            const existingIds = new Set(mainRows.map(r => r[0]));
            if (!existingIds.has(txId)) {
              const MAIN_HEADERS = [
                'transaction_id','advertiser_id','advertiser_name','order_date','currency_id',
                'sale_amount','commission_amount','status','click_date','validation_date',
                'modified_date','sub_id_1','sub_id_2','sub_id_3','sub_id_4','sub_id_5',
                'sub_id_6','decline_reason','paid_to_publisher','clickout_url','product_title','order_ref',
              ];
              const record = {
                transaction_id: txId, advertiser_id: ADVERTISER_ID,
                advertiser_name: 'RPM Pickleball', order_date: reconcileTimestamp,
                currency_id: 'USD', sale_amount: String(saleCents),
                commission_amount: String(gapCents), status: 'approved',
              };
              const row = MAIN_HEADERS.map(h => String(record[h] ?? ''));
              await sheets.spreadsheets.values.update({
                spreadsheetId,
                range: `${MAIN_TAB}!A${mainRows.length + 2}`,
                valueInputOption: 'RAW',
                requestBody: { values: [row] },
              });
              console.log(`✅ Wrote EOD gap row: $${(gapCents / 100).toFixed(2)} commission`);
            }
          } else {
            console.log('No gap — intraday rows already account for the full day.');
          }

          // 6. Write the snapshot for the day we reconciled (skip if already exists)
          const alreadySnapped = snapRows.some(r => r[0] === reconcileDate);
          if (!alreadySnapped) {
            const nextRow = snapRows.length + 2;
            await sheets.spreadsheets.values.update({
              spreadsheetId, range: `${SNAPSHOT_TAB}!A${nextRow}`, valueInputOption: 'RAW',
              requestBody: { values: [[reconcileDate, String(todayCumulativeSales), todayCumulative.toFixed(2), reconcileTimestamp]] },
            });
            console.log(`✅ Snapshot written: ${reconcileDate} | sales=${todayCumulativeSales} | earned=$${todayCumulative.toFixed(2)}`);
          } else {
            console.log(`Snapshot for ${reconcileDate} already recorded.`);
          }
          EOF
