  <script>

    function createPopup() {
      let bixgrowModal = document.createElement('div');
      bixgrowModal.id = "myModal";
      bixgrowModal.classList.add('modal');
      document.body.appendChild(bixgrowModal);
      let html = `
            <div class="modal-header">
             <h5 style="margin-bottom: 0;">Enable third party cookies on BixGrow for the best experience</h5> <span class="close">&times;</span>
            </div>
<div class="modal-content">

  <p>BixGrow uses cookies to provide a safer and better browser experience. Please enable third party cookies or use a different web browser to get the best performance. <br>
  Learn how to enable third party cookies for your browser <a href="https://support.google.com/chrome/answer/95647?hl=en-US&amp;co=GENIE.Platform%3DDesktop&amp;oco=1#zippy=%2Callow-or-block-cookies%2Callow-or-block-cookies-for-a-specific-site" data-polaris-unstyled="true"  target="_blank" aria-label="Link to third party cookie documentation" >here</a>
  </p>
</div>`;
      bixgrowModal.insertAdjacentHTML('beforeend', html);

      let head = document.head || document.getElementsByTagName('head')[0],
        style = document.createElement('style');
      let css = `.modal {
                display: none; /* Hidden by default */
                position: fixed; /* Stay in place */
                z-index: 1; /* Sit on top */
                padding-top: 100px; /* Location of the box */
                left: 0;
                top: 0;
                width: 100%; /* Full width */
                height: 100%; /* Full height */
                overflow: auto; /* Enable scroll if needed */
                background-color: rgb(0,0,0); /* Fallback color */
                background-color: rgba(0,0,0,0.4); /* Black w/ opacity */
                }
                .modal-header{
                    display:flex;
                    justify-content:space-between;
                    margin: auto;
                    width: 80%;
                    background-color: #fefefe;
                    align-items: center;
                    padding:10px 20px;
                    border-top-right-radius: 6px;
                    border-top-left-radius: 6px;
                }

                .modal-content {
                background-color: #fefefe;
                margin: auto;
                padding: 20px;
                border-top: 1px solid #888;
                width: 80%;
                border-bottom-left-radius: 6px;
                border-bottom-right-radius: 6px;
                }

                .close {
                color: #616a75;
                float: right;
                font-size: 28px;
                font-weight: bold;
                }

                .close:hover,
                .close:focus {
                color: #000;
                text-decoration: none;
                cursor: pointer;
                }`

      head.appendChild(style);
      style.type = 'text/css';
      if (style.styleSheet) {
        // This is required for IE8 and below.
        style.styleSheet.cssText = css;
      } else {
        style.appendChild(document.createTextNode(css));
      }
      let span = document.getElementsByClassName("close")[0];
      bixgrowModal.style.display = "block";
      span.onclick = function () {
        bixgrowModal.style.display = "none";
      }
      window.onclick = function (event) {
        if (event.target == bixgrowModal) {
          bixgrowModal.style.display = "none";
        }
      }
    }
  </script>
