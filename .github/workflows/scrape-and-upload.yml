# Scrape affiliate commissions and upload to Google Sheets.
# Runs on schedule and can be triggered manually.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   BIXGROW_EMAIL, BIXGROW_PASSWORD
#   SOCIALSNOWBALL_EMAIL, SOCIALSNOWBALL_PASSWORD
#   SOCIALSNOWBALL_ENHANCE_EMAIL, SOCIALSNOWBALL_ENHANCE_PASSWORD (optional per-account overrides)
#   SHORTLY_EMAIL, SHORTLY_PASSWORD
#   UPPROMOTE_EMAIL, UPPROMOTE_PASSWORD
#   UPPROMOTE_LUZZ_EMAIL, UPPROMOTE_HONOLULU_EMAIL  (per-account email overrides)
#   UPPROMOTE_UDRIPPIN_EMAIL, UPPROMOTE_UDRIPPIN_PASSWORD  (per-account overrides)
#   UPPROMOTE_GRUVN_EMAIL, UPPROMOTE_GRUVN_PASSWORD        (per-account overrides)
#   UPPROMOTE_SIXZERO_EMAIL                                (per-account email override)
#   UPPROMOTE_NEONIC_EMAIL, UPPROMOTE_CHORUS_EMAIL         (per-account email overrides)
#   UPPROMOTE_THRIVE_EMAIL, UPPROMOTE_MARK_EMAIL           (per-account email overrides)
#   UPPROMOTE_GHERKIN_EMAIL                                (per-account email override)
#   UPPROMOTE_PROTON_EMAIL                                 (per-account email override)
#   UPPROMOTE_LUZZ_BASE_URL, UPPROMOTE_HONOLULU_BASE_URL, UPPROMOTE_DIADEM_BASE_URL  (optional, have hardcoded defaults)
#   UPPROMOTE_HOLBROOK_BASE_URL, UPPROMOTE_PICKLEBALLAPES_BASE_URL                 (optional, have hardcoded defaults)
#   AFFILIATLY_EMAIL, AFFILIATLY_PASSWORD
#   GOAFFPRO_EMAIL, GOAFFPRO_PASSWORD
#   RPM_EMAIL, RPM_PASSWORD, RPM_GOOGLE_SHEET_ID
#   GOOGLE_SHEET_ID
#   GOOGLE_CREDENTIALS_JSON  (entire contents of your Google service account JSON key file)
#   TWOCAPTCHA_API_KEY  (optional but recommended for unattended uppromote/affiliatly runs)
#   SLACK_WEBHOOK_URL   (Slack Incoming Webhook URL for job notifications)

name: Scrape and upload commissions

on:
  schedule:
    # Every 1.5 hours, 7am–11:30pm Central (CDT = UTC-5)
    # 7:00am, 8:30am, 10:00am, 11:30am, 1:00pm, 2:30pm
    # 4:00pm, 5:30pm, 7:00pm,  8:30pm,  10:00pm, 11:30pm
    - cron: '0 12,15,18,21,0,3 * * *'
    - cron: '30 13,16,19,22,1,4 * * *'
  workflow_dispatch:

jobs:
  scrape-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    environment: main
    permissions:
      contents: read
      actions: write
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Cache Puppeteer browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-puppeteer-

      - name: Restore session cookies cache
        id: session-cookies-restore
        uses: actions/cache/restore@v4
        with:
          path: |
            packages/affiliatly/.cookies/engage-cookies.json
            packages/goaffpro/.cookies/forwrd-cookies.json
            packages/uppromote/.cookies/luzz-cookies.json
            packages/uppromote/.cookies/honolulu-cookies.json
            packages/uppromote/.cookies/holbrook-cookies.json
            packages/uppromote/.cookies/diadem-cookies.json
            packages/uppromote/.cookies/pickleballapes-cookies.json
            packages/uppromote/.cookies/udrippin-cookies.json
            packages/uppromote/.cookies/11six24-cookies.json
            packages/uppromote/.cookies/vatic-cookies.json
            packages/uppromote/.cookies/gruvn-cookies.json
            packages/uppromote/.cookies/sixzero-cookies.json
            packages/uppromote/.cookies/neonic-cookies.json
            packages/uppromote/.cookies/chorus-cookies.json
            packages/uppromote/.cookies/thrive-cookies.json
            packages/uppromote/.cookies/mark-cookies.json
            packages/uppromote/.cookies/gherkin-cookies.json
            packages/uppromote/.cookies/proton-cookies.json
            packages/rpm/.cookies/rpm-cookies.json
            packages/refersion/.cookies/gearbox-cookies.json
            packages/refersion/.cookies/erne-cookies.json
            packages/refersion/.cookies/volair-cookies.json
          key: ${{ runner.os }}-session-cookies-v1-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-session-cookies-v1-

      - name: Install Chromium dependencies & project dependencies
        run: |
          # Run apt-get in background while pnpm installs (they are independent)
          (
            sudo apt-get update
            sudo apt-get install -y \
              libgbm1 libatk-bridge2.0-0 libatk1.0-0 libcups2 \
              libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
              libxrandr2 libnss3 libnspr4
            sudo apt-get install -y libasound2t64 || sudo apt-get install -y libasound2
          ) &
          APT_PID=$!
          pnpm install --frozen-lockfile
          wait $APT_PID

      - name: Write Google credentials
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: node -e "require('fs').writeFileSync('credentials.json', process.env.GOOGLE_CREDENTIALS_JSON || '')"

      - name: Scrape and upload
        id: scrape
        env:
          BIXGROW_EMAIL: ${{ secrets.BIXGROW_EMAIL }}
          BIXGROW_PASSWORD: ${{ secrets.BIXGROW_PASSWORD }}
          SOCIALSNOWBALL_EMAIL: ${{ secrets.SOCIALSNOWBALL_EMAIL }}
          SOCIALSNOWBALL_PASSWORD: ${{ secrets.SOCIALSNOWBALL_PASSWORD }}
          SOCIALSNOWBALL_ENHANCE_EMAIL: ${{ secrets.SOCIALSNOWBALL_ENHANCE_EMAIL }}
          SOCIALSNOWBALL_ENHANCE_PASSWORD: ${{ secrets.SOCIALSNOWBALL_ENHANCE_PASSWORD }}
          SHORTLY_EMAIL: ${{ secrets.SHORTLY_EMAIL }}
          SHORTLY_PASSWORD: ${{ secrets.SHORTLY_PASSWORD }}
          UPPROMOTE_EMAIL: ${{ secrets.UPPROMOTE_EMAIL }}
          UPPROMOTE_PASSWORD: ${{ secrets.UPPROMOTE_PASSWORD }}
          UPPROMOTE_LUZZ_EMAIL: ${{ secrets.UPPROMOTE_LUZZ_EMAIL }}
          UPPROMOTE_HONOLULU_EMAIL: ${{ secrets.UPPROMOTE_HONOLULU_EMAIL }}
          UPPROMOTE_LUZZ_BASE_URL: ${{ secrets.UPPROMOTE_LUZZ_BASE_URL }}
          UPPROMOTE_HONOLULU_BASE_URL: ${{ secrets.UPPROMOTE_HONOLULU_BASE_URL }}
          UPPROMOTE_DIADEM_BASE_URL: ${{ secrets.UPPROMOTE_DIADEM_BASE_URL }}
          UPPROMOTE_HOLBROOK_BASE_URL: ${{ secrets.UPPROMOTE_HOLBROOK_BASE_URL }}
          UPPROMOTE_PICKLEBALLAPES_BASE_URL: ${{ secrets.UPPROMOTE_PICKLEBALLAPES_BASE_URL }}
          UPPROMOTE_UDRIPPIN_EMAIL: ${{ secrets.UPPROMOTE_UDRIPPIN_EMAIL }}
          UPPROMOTE_UDRIPPIN_PASSWORD: ${{ secrets.UPPROMOTE_UDRIPPIN_PASSWORD }}
          UPPROMOTE_GRUVN_EMAIL: ${{ secrets.UPPROMOTE_GRUVN_EMAIL }}
          UPPROMOTE_GRUVN_PASSWORD: ${{ secrets.UPPROMOTE_GRUVN_PASSWORD }}
          UPPROMOTE_SIXZERO_EMAIL: ${{ secrets.UPPROMOTE_SIXZERO_EMAIL }}
          UPPROMOTE_NEONIC_EMAIL: ${{ secrets.UPPROMOTE_NEONIC_EMAIL }}
          UPPROMOTE_CHORUS_EMAIL: ${{ secrets.UPPROMOTE_CHORUS_EMAIL }}
          UPPROMOTE_THRIVE_EMAIL: ${{ secrets.UPPROMOTE_THRIVE_EMAIL }}
          UPPROMOTE_MARK_EMAIL: ${{ secrets.UPPROMOTE_MARK_EMAIL }}
          UPPROMOTE_GHERKIN_EMAIL: ${{ secrets.UPPROMOTE_GHERKIN_EMAIL }}
          UPPROMOTE_PROTON_EMAIL: ${{ secrets.UPPROMOTE_PROTON_EMAIL }}
          AFFILIATLY_EMAIL: ${{ secrets.AFFILIATLY_EMAIL }}
          AFFILIATLY_PASSWORD: ${{ secrets.AFFILIATLY_PASSWORD }}
          GOAFFPRO_EMAIL: ${{ secrets.GOAFFPRO_EMAIL }}
          GOAFFPRO_PASSWORD: ${{ secrets.GOAFFPRO_PASSWORD }}
          RPM_EMAIL: ${{ secrets.RPM_EMAIL }}
          RPM_PASSWORD: ${{ secrets.RPM_PASSWORD }}
          TWOCAPTCHA_API_KEY: ${{ secrets.TWOCAPTCHA_API_KEY }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_PATH: ${{ github.workspace }}/credentials.json
        run: |
          # Run each scraper independently so one failure doesn't block the rest.
          FAILED=""
          run_scraper() {
            local name="$1"; shift
            echo "::group::$name"
            if "$@"; then
              echo "::notice::✓ $name succeeded"
            else
              echo "::warning::✗ $name failed (exit $?)"
              FAILED="${FAILED:+$FAILED, }$name"
            fi
            echo "::endgroup::"
          }

          run_scraper "bixgrow"       pnpm bixgrow
          run_scraper "socialsnowball" pnpm socialsnowball:all
          run_scraper "shortly"        pnpm shortly
          run_scraper "uppromote"      pnpm uppromote:all
          run_scraper "affiliatly"     pnpm affiliatly
          run_scraper "goaffpro"       pnpm goaffpro
          run_scraper "rpm"            pnpm rpm
          run_scraper "refersion"      pnpm refersion

          if [ -n "$FAILED" ]; then
            echo "failed_scrapers=$FAILED" >> "$GITHUB_OUTPUT"
            echo "::error::Failed scrapers: $FAILED"
            exit 1
          fi

      - name: Notify Slack
        if: (failure() || cancelled()) && env.SLACK_WEBHOOK_URL != ''
        env:
          SCRAPE_OUTCOME: ${{ steps.scrape.outcome }}
          FAILED_SCRAPERS: ${{ steps.scrape.outputs.failed_scrapers }}
        run: |
          if [ -z "$SCRAPE_OUTCOME" ] || [ "$SCRAPE_OUTCOME" = "cancelled" ]; then
            EMOJI=":warning:"
            TEXT="Run was cancelled by GitHub (temporary infrastructure issue). No scrapers ran — nothing to worry about, it will retry on the next scheduled run."
          elif [ -n "$FAILED_SCRAPERS" ]; then
            EMOJI=":x:"
            TEXT="One or more scrapers failed: *${FAILED_SCRAPERS}*\nCheck the run log to see what went wrong."
          else
            EMOJI=":x:"
            TEXT="A setup step failed before the scrapers could run. Check the run log for details."
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          payload=$(cat <<EOF
          {
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "${EMOJI} *Scrape and upload commissions*\n${TEXT}\n\n<${RUN_URL}|View run>"
                }
              }
            ]
          }
          EOF
          )
          curl -s -X POST -H 'Content-type: application/json' --data "$payload" "$SLACK_WEBHOOK_URL" || true

      - name: Save session cookies cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            packages/affiliatly/.cookies/engage-cookies.json
            packages/goaffpro/.cookies/forwrd-cookies.json
            packages/uppromote/.cookies/luzz-cookies.json
            packages/uppromote/.cookies/honolulu-cookies.json
            packages/uppromote/.cookies/holbrook-cookies.json
            packages/uppromote/.cookies/diadem-cookies.json
            packages/uppromote/.cookies/pickleballapes-cookies.json
            packages/uppromote/.cookies/udrippin-cookies.json
            packages/uppromote/.cookies/11six24-cookies.json
            packages/uppromote/.cookies/vatic-cookies.json
            packages/uppromote/.cookies/gruvn-cookies.json
            packages/uppromote/.cookies/sixzero-cookies.json
            packages/uppromote/.cookies/neonic-cookies.json
            packages/uppromote/.cookies/chorus-cookies.json
            packages/uppromote/.cookies/thrive-cookies.json
            packages/uppromote/.cookies/mark-cookies.json
            packages/uppromote/.cookies/gherkin-cookies.json
            packages/uppromote/.cookies/proton-cookies.json
            packages/rpm/.cookies/rpm-cookies.json
            packages/refersion/.cookies/gearbox-cookies.json
            packages/refersion/.cookies/erne-cookies.json
            packages/refersion/.cookies/volair-cookies.json
          key: ${{ runner.os }}-session-cookies-v1-${{ github.run_id }}

      - name: Delete session cookie caches older than 7 days
        if: always()
        uses: actions/github-script@v7
        env:
          COOKIE_CACHE_PREFIX: ${{ runner.os }}-session-cookies-v1-
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prefix = process.env.COOKIE_CACHE_PREFIX;
            const cutoffMs = Date.now() - 7 * 24 * 60 * 60 * 1000;
            let page = 1;
            let deleted = 0;

            while (true) {
              const res = await github.rest.actions.getActionsCacheList({
                owner,
                repo,
                key: prefix,
                per_page: 100,
                page,
              });

              const caches = res.data.actions_caches || [];
              if (caches.length === 0) break;

              for (const cache of caches) {
                const lastAccessedMs = new Date(cache.last_accessed_at).getTime();
                if (lastAccessedMs < cutoffMs) {
                  core.info(`Deleting cache ${cache.key} (id: ${cache.id})`);
                  await github.rest.actions.deleteActionsCacheById({
                    owner,
                    repo,
                    cache_id: cache.id,
                  });
                  deleted += 1;
                }
              }

              if (caches.length < 100) break;
              page += 1;
            }

            core.info(`Deleted ${deleted} cache entr${deleted === 1 ? 'y' : 'ies'} older than 7 days.`);
