name: RPM end-of-day snapshot

# Fires at 11:59 PM Central — both crons handle DST (CDT=UTC-5, CST=UTC-6).
# The script deduplicates so only one row is written per calendar date.
on:
  schedule:
    - cron: '59 4 * * *'  # 11:59 PM CDT (Apr–Oct)
    - cron: '59 5 * * *'  # 11:59 PM CST (Nov–Mar)
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment: main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter @kitchen/shared

      - name: Write Google credentials
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: node -e "require('fs').writeFileSync('credentials.json', process.env.GOOGLE_CREDENTIALS_JSON || '')"

      - name: Write EOD snapshot
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_PATH: ${{ github.workspace }}/credentials.json
        run: |
          cd packages/shared
          node --input-type=module <<'EOF'
          import { google } from 'googleapis';
          import { readFile } from 'fs/promises';

          const spreadsheetId = process.env.GOOGLE_SHEET_ID;
          const credentials = JSON.parse(await readFile(process.env.GOOGLE_CREDENTIALS_PATH, 'utf-8'));
          const auth = new google.auth.GoogleAuth({ credentials, scopes: ['https://www.googleapis.com/auth/spreadsheets'] });
          const sheets = google.sheets({ version: 'v4', auth: await auth.getClient() });

          // Central time date for today
          const centralDate = new Intl.DateTimeFormat('en-CA', { timeZone: 'America/Chicago' }).format(new Date());

          const SNAPSHOT_TAB = 'RPM Daily Snapshots';
          const TRACKING_TAB = 'RPM Commissions';

          // Ensure snapshot tab exists
          const meta = await sheets.spreadsheets.get({ spreadsheetId });
          const exists = meta.data.sheets.some(s => s.properties.title === SNAPSHOT_TAB);
          if (!exists) {
            await sheets.spreadsheets.batchUpdate({
              spreadsheetId,
              requestBody: { requests: [{ addSheet: { properties: { title: SNAPSHOT_TAB } } }] },
            });
            await sheets.spreadsheets.values.update({
              spreadsheetId,
              range: `${SNAPSHOT_TAB}!A1`,
              valueInputOption: 'RAW',
              requestBody: { values: [['date', 'total_sales', 'total_earned_usd', 'recorded_at']] },
            });
            console.log(`Created tab: ${SNAPSHOT_TAB}`);
          }

          // Deduplicate — skip if today already has a row
          const existing = await sheets.spreadsheets.values.get({ spreadsheetId, range: `${SNAPSHOT_TAB}!A:A` });
          const dates = (existing.data.values || []).slice(1).map(r => r[0]);
          if (dates.includes(centralDate)) {
            console.log(`Snapshot for ${centralDate} already exists — skipping.`);
            process.exit(0);
          }

          // Read latest cumulative from RPM Commissions tab
          const tracking = await sheets.spreadsheets.values.get({ spreadsheetId, range: `${TRACKING_TAB}!A:E` });
          const rows = tracking.data.values || [];
          if (rows.length < 2) { console.error('No RPM data found'); process.exit(1); }
          const last = rows[rows.length - 1];
          const totalSales = last[1];
          const totalEarned = last[2];

          // Central timestamp
          const recordedAt = new Intl.DateTimeFormat('en-US', {
            timeZone: 'America/Chicago',
            year: 'numeric', month: '2-digit', day: '2-digit',
            hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false,
          }).formatToParts(new Date()).reduce((acc, p) => ({ ...acc, [p.type]: p.value }), {});
          const ts = `${recordedAt.year}-${recordedAt.month}-${recordedAt.day} ${recordedAt.hour}:${recordedAt.minute}:${recordedAt.second}`;

          const nextRow = (existing.data.values || []).length + 1;
          await sheets.spreadsheets.values.update({
            spreadsheetId,
            range: `${SNAPSHOT_TAB}!A${nextRow}`,
            valueInputOption: 'RAW',
            requestBody: { values: [[centralDate, totalSales, totalEarned, ts]] },
          });

          console.log(`✅ Snapshot written: ${centralDate} | sales=${totalSales} | earned=$${totalEarned}`);
          EOF
